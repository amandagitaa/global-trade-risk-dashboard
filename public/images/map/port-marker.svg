<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g transform="translate(10, 15)">
    <!-- Dock / Pier -->
    <rect x="0" y="55" width="80" height="8" fill="#7f8c8d" />
    <rect x="10" y="63" width="8" height="12" fill="#95a5a6" />
    <rect x="62" y="63" width="8" height="12" fill="#95a5a6" />
    
    <!-- Water -->
    <path d="M -10 70 Q 35 80 90 70" stroke="#3498db" stroke-width="4" fill="none"/>
    
    <!-- Crane Base -->
    <polygon points="15,55 25,25 35,55" fill="#f39c12" />
    
    <!-- Crane Cabin -->
    <rect x="20" y="20" width="10" height="10" fill="#2c3e50" />
    
    <!-- Crane Arm -->
    <path d="M 15 25 L 75 15" stroke="#e67e22" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Cable -->
    <line x1="65" y1="16" x2="65" y2="45" stroke="#34495e" stroke-width="2" />
    
    <!-- Suspended Container -->
    <rect x="55" y="45" width="20" height="10" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
  </g>
</svg>
